<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>

    <style>
        body {
            background-color: #15202b;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        .box {
            width: 500px;
            margin: 100px auto;
            background: #192734;
            padding: 20px;
            border-radius: 15px;
        }

        h2 {
            color: #1da1f2;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 15px;
            border: none;
            background: #22303c;
            color: white;
            resize: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            background: #1da1f2;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #1da1f2;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Edit Post</h2>

    <form method="post">
        <textarea name="tweet" maxlength="280" required>{{ post[2] }}</textarea>
        <button>Update</button>
    </form>

    <p><a href="/home">Cancel</a></p>
</div>

</body>
</html>
