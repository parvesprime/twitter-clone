<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background-color: #15202b;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        .box {
            width: 400px;
            margin: 100px auto;
            background: #192734;
            padding: 20px;
            border-radius: 12px;
        }

        h2 {
            color: #1da1f2;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 25px;
            border: none;
            background: #22303c;
            color: white;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: none;
            background: #1da1f2;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #1da1f2;
            text-decoration: none;
        }
    </style>

</head>
<body>

<div class="box">
    <h2>Login to Fake Twitter</h2>

    <form method="post">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>

    <p><a href="/register">New user? Register</a></p>
</div>

</body>
</html>
